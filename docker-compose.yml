services:
  backend:
    build: ./backend
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DATABASE_URL: sqlite:////app/var/app.db
    volumes:
      - backend_data:/app/var
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  backend_data:
